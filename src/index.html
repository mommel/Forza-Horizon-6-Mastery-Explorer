<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forza Horizon 6 Mastery Explorer</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <div class="background-glow background-glow-left"></div>
  <div class="background-glow background-glow-right"></div>

  <main class="app-shell">
    <section class="panel selection-panel">
      <div class="panel-header">
        <p class="eyebrow">Forza Horizon 6</p>
        <h1>Mastery Explorer</h1>
        <p class="panel-copy">
          Select mastery perks below to dynamically filter the dataset.
        </p>
      </div>

      <div class="search-container">
        <input type="search" id="car-search" placeholder="Search cars or manufacturers..." aria-label="Search cars">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>

      <div class="toolbar-section">
        <div class="filter-mode-container">
          <span class="mode-label">Perk Match:</span>
          <div class="toggle-group" role="radiogroup" aria-label="Filter match mode">
            <button id="mode-any" class="toggle-button active" type="button" role="radio"
              aria-checked="true">ANY</button>
            <button id="mode-all" class="toggle-button" type="button" role="radio" aria-checked="false">ALL</button>
          </div>
        </div>
        <div class="selection-toolbar">
          <button id="select-all" class="toolbar-button" type="button">Select All</button>
          <button id="clear-all" class="toolbar-button toolbar-button-secondary" type="button">Clear</button>
        </div>
      </div>

      <div class="selection-stats">
        <div class="stat-chip">
          <span class="stat-label">Selected Perks</span>
          <strong id="active-count">0</strong>
        </div>
        <div class="stat-chip">
          <span class="stat-label">Total Perks</span>
          <strong id="total-icons">0</strong>
        </div>
      </div>

      <div id="icon-grid" class="icon-grid" aria-label="Mastery selection buttons"></div>
    </section>

    <section class="panel output-panel">
      <div class="panel-header output-header">
        <div>
          <p class="eyebrow">Live Results</p>
          <h2>Matching Cars</h2>
        </div>
        <div class="results-summary">
          <span id="results-count">0</span>
          <small>cars</small>
        </div>
      </div>

      <div id="active-filters" class="active-filters"></div>
      <div id="results" class="results-grid"></div>
    </section>
  </main>

  <template id="car-card-template">
    <article class="car-card">
      <div class="car-card-info">
        <h3 class="car-name"></h3>
        <div class="car-year"></div>
      </div>
      <div class="car-masteries-container">
        <h4 class="mastery-grid-title">Car Mastery Tree</h4>
        <div class="car-masteries" aria-label="Car masteries grid"></div>
      </div>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>

</html>
